# Nginx reverse proxy for the Pharmacogenomics Pipeline
# Place at: /etc/nginx/sites-available/pharmacogenomics
# Then: sudo ln -s /etc/nginx/sites-available/pharmacogenomics /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;   # replace with your domain or EC2 public DNS if you have one

    # Allow large VCF uploads
    client_max_body_size 60M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Analysis can take a while (VEP + PharmGKB network calls)
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
