version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pharmacogenomics-db
    environment:
      POSTGRES_DB: pharmacogenomics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacogenomics_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pharmacogenomics-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # FastAPI Backend
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: pharmacogenomics-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-pharmacogenomics_pass}@postgres:5432/pharmacogenomics
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=["http://localhost:3000","https://yourdomain.com"]
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../uploads:/app/uploads
      - ../results:/app/results
      - ../config.json:/app/config.json
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # React Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: pharmacogenomics-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: pharmacogenomics-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ../uploads:/var/www/uploads
      - ../results:/var/www/results
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # Celery Worker (Background Tasks)
  celery-worker:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: pharmacogenomics-worker
    command: celery -A backend.tasks worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-pharmacogenomics_pass}@postgres:5432/pharmacogenomics
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - ../uploads:/app/uploads
      - ../results:/app/results
      - ../config.json:/app/config.json
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: pharmacogenomics-beat
    command: celery -A backend.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-pharmacogenomics_pass}@postgres:5432/pharmacogenomics
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - celery_beat_data:/app/celerybeat-schedule
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: pharmacogenomics-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: pharmacogenomics-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    networks:
      - pharmacogenomics_network

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
  prometheus_data:
  grafana_data:

networks:
  pharmacogenomics_network:
    driver: bridge